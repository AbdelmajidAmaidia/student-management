# ============================================
# Application
# ============================================
spring.application.name=student-management

# ============================================
# Server
# ============================================
server.port=${SERVER_PORT:8082}

# ============================================
# Database (MySQL)
# ============================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/student_management?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:admin}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================
# JPA / Hibernate
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ============================================
# JWT
# ============================================
app.jwt.secret=${APP_JWT_SECRET:my-super-secure-jwt-secret-key-for-student-management}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:3600000}
app.jwt.refresh-expiration-ms=${APP_JWT_REFRESH_EXPIRATION_MS:604800000}

# ============================================
# Swagger
# ============================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ============================================
# Spring Boot Actuator
# ============================================
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always

# ============================================
# Prometheus
# ============================================
management.endpoint.prometheus.enabled=true
management.prometheus.metrics.export.enabled=true
