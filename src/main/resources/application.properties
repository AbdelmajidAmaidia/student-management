spring.application.name=student-management

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/student_management?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.******
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

app.jwt.secret=${JWT_SECRET:VGhpc0lzQVNlY3VyZVN0dWRlbnRNYW5hZ2VtZW50SldUU2VjcmV0S2V5MTIzNDU2Nzg5MA==}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
